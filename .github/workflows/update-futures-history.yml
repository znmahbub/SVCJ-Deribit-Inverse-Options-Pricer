name: update-futures-history

on:
  workflow_dispatch:
  schedule:
    - cron: "7 10 * * *"
      timezone: "Europe/Moscow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update futures history
        run: |
          python src/backfill_futures_marks.py --data-dir data --outdir data

      - name: Commit updated futures data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/term_futures_marks.csv data/perpetual_futures_prices.csv data/snapshot_currency_combos.csv
          git commit -m "Update futures history" || echo "Nothing to commit"
          git push
